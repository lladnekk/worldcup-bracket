<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Cup 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
  :root {
    --gold: #c9a84c;
    --gold-dim: #5a4520;
    --bg: #0d0d0d;
    --text: #e0e0e0;
    --muted: #555;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 60px;
  }
  header { text-align:center; padding:28px 20px 12px; }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem,5vw,3.2rem);
    letter-spacing: 6px;
    color: var(--gold);
    line-height: 1;
  }
  header p { font-size:.65rem; letter-spacing:4px; color:var(--muted); margin-top:5px; text-transform:uppercase; }

  .bracket-scene {
    position: relative;
    width: min(860px, 96vw);
    height: min(860px, 96vw);
    margin: 0 auto;
  }
  .center-glow {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:70%; height:70%;
    background: radial-gradient(ellipse at center,
      rgba(201,168,76,0.20) 0%, rgba(201,168,76,0.07) 30%,
      rgba(201,168,76,0.02) 55%, transparent 72%);
    border-radius:50%; pointer-events:none; z-index:0;
  }
  .lines-svg {
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:1;
  }

  /* ── Team node (outer ring) ── */
  .team-node {
    position:absolute; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    cursor:pointer; z-index:10;
  }
  .team-circle {
    width:42px; height:42px; border-radius:50%; overflow:hidden;
    border:2px solid #2a2a2a;
    transition:transform .18s, border-color .18s, box-shadow .18s;
    background:#161616;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .team-node:hover .team-circle { transform:scale(1.12); border-color:var(--gold); box-shadow:0 0 12px rgba(201,168,76,0.4); }
  .team-circle img { width:100%; height:100%; object-fit:cover; display:block; }
  .team-label {
    font-size:.5rem; font-weight:600; color:var(--muted);
    white-space:nowrap; letter-spacing:.3px; text-align:center;
    max-width:68px; overflow:hidden; text-overflow:ellipsis;
    line-height:1.2; pointer-events:none;
  }
  .winner-lbl { color:var(--gold) !important; }

  /* ── Inner match node (R16 / QF / SF / Final) ── */
  .match-node {
    position:absolute; transform:translate(-50%,-50%);
    cursor:pointer; z-index:10;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .match-dot {
    border-radius:50%;
    border:1.5px solid #3a3020;
    background:#0e0c08;
    display:flex; align-items:center; justify-content:center;
    transition:transform .18s, border-color .18s, box-shadow .18s;
    flex-shrink:0;
    overflow:hidden;
  }
  .match-node:hover .match-dot { transform:scale(1.2); border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,0.35); }
  .match-dot img { width:100%; height:100%; object-fit:cover; display:block; }
  .match-dot.tbd { border-color:#252010; background:#0a0906; }
  .match-dot .tbd-q { font-size:.4rem; color:#3a3020; }
  .match-dot.has-winner { border-color:var(--gold); box-shadow:0 0 6px rgba(201,168,76,0.25); }

  /* ── Winner advancement node (R_WIN) ── */
  .winner-node {
    position:absolute; transform:translate(-50%,-50%);
    cursor:pointer; z-index:10;
  }
  .winner-circle {
    width:26px; height:26px; border-radius:50%; overflow:hidden;
    border:1.5px solid #2a2a2a;
    background:#0e0c08;
    display:flex; align-items:center; justify-content:center;
    transition:transform .18s, border-color .18s, box-shadow .18s;
  }
  .winner-circle.known {
    border-color:var(--gold);
    box-shadow:0 0 7px rgba(201,168,76,0.35);
  }
  .winner-node:hover .winner-circle {
    transform:scale(1.18);
    border-color:var(--gold);
    box-shadow:0 0 12px rgba(201,168,76,0.5);
  }
  .winner-circle img { width:100%; height:100%; object-fit:cover; display:block; }

  /* ── TBD opponent node (R_OPP) ── */
  .opp-node {
    position:absolute; transform:translate(-50%,-50%);
    cursor:pointer; z-index:10;
  }
  .opp-circle {
    width:14px; height:14px; border-radius:50%;
    border:1px solid #252010;
    background:#0a0906;
    display:flex; align-items:center; justify-content:center;
    transition:transform .18s, border-color .18s;
  }
  .opp-node:hover .opp-circle {
    transform:scale(1.25);
    border-color:var(--gold);
  }
  .opp-circle .tbd-q { font-size:.38rem; color:#3a3020; }

  /* sizes for inner rounds */
  .sz-r16 .match-dot { width:22px; height:22px; }
  .sz-qf  .match-dot { width:18px; height:18px; }
  .sz-sf  .match-dot { width:15px; height:15px; }

  /* status rings on outer teams */
  .s-done    .team-circle { border-color:#4caf50; }
  .s-winner  .team-circle { border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,0.4); }
  .s-upcoming .team-circle { border-color:#4a7fd4; }
  .s-live    .team-circle { border-color:#e03c3c; animation:pulse 1s infinite; }
  .s-tbd     .team-circle { border-color:#1e1e1e; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(224,60,60,0.5); } 50%{ box-shadow:0 0 0 3px rgba(224,60,60,0); } }

  /* score tag */
  .score-tag {
    font-family:'Bebas Neue',sans-serif; font-size:.68rem; color:var(--gold);
    letter-spacing:1.5px; pointer-events:none;
    position:absolute; transform:translate(-50%,-50%);
    z-index:11; white-space:nowrap;
    text-shadow:0 1px 4px rgba(0,0,0,0.95);
  }

  /* ── Trophy ── */
  .trophy-node {
    position:absolute; transform:translate(-50%,-50%); z-index:20; cursor:pointer;
  }
  .trophy-wrap {
    width:96px; height:96px; border-radius:50%;
    background:radial-gradient(circle at 45% 38%, #3a2600, #1a1100 55%, #060400);
    border:1.5px solid rgba(201,168,76,0.55);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 0 1px rgba(201,168,76,0.12),
               0 0 28px rgba(201,168,76,0.45),
               0 0 70px rgba(201,168,76,0.18),
               0 0 120px rgba(201,168,76,0.07);
    transition:transform .2s, box-shadow .2s; overflow:hidden;
  }
  .trophy-node:hover .trophy-wrap { transform:scale(1.1); box-shadow:0 0 0 1px rgba(201,168,76,0.3), 0 0 42px rgba(201,168,76,0.65), 0 0 90px rgba(201,168,76,0.28); }
  .trophy-wrap img { width:80px; height:80px; object-fit:contain; filter:drop-shadow(0 0 10px rgba(201,168,76,0.85)) brightness(1.12) saturate(1.15); }

  /* Legend */
  .legend { display:flex; gap:22px; margin-top:16px; flex-wrap:wrap; justify-content:center; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:.62rem; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
  .ldot { width:8px; height:8px; border-radius:50%; }

  /* Modal */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:300; align-items:center; justify-content:center; padding:20px; }
  .overlay.open { display:flex; }
  .modal { background:#111; border:1px solid var(--gold-dim); border-radius:14px; padding:28px; max-width:390px; width:100%; position:relative; box-shadow:0 0 50px rgba(201,168,76,0.1); }
  .modal-close { position:absolute; top:14px; right:16px; background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer; }
  .modal-close:hover { color:#fff; }
  .modal-round { font-size:.58rem; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:18px; }
  .modal-teams { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .modal-team { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .modal-flag-img { width:56px; height:40px; object-fit:cover; border-radius:6px; border:1px solid #2a2a2a; }
  .modal-tname { font-size:.78rem; font-weight:700; text-align:center; }
  .modal-tname.w { color:var(--gold); }
  .modal-scores { display:flex; flex-direction:column; align-items:center; gap:3px; padding:0 8px; }
  .modal-scoreline { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:4px; color:var(--gold); line-height:1; }
  .modal-vs { font-size:.58rem; letter-spacing:2px; color:var(--muted); }
  hr.md { border:none; border-top:1px solid #1e1e1e; margin:16px 0; }
  .modal-info { display:flex; flex-direction:column; gap:10px; }
  .modal-info-row { display:flex; align-items:flex-start; gap:10px; font-size:.78rem; color:#aaa; }
  .ii { font-size:1rem; min-width:18px; }
  .il { display:block; font-size:.56rem; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:2px; }
  .badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:.58rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-top:14px; }
  .b-done     { background:#0d1f0d; color:#4caf50; border:1px solid #4caf50; }
  .b-upcoming { background:#0d1020; color:#4a7fd4; border:1px solid #4a7fd4; }
  .b-tbd      { background:#151515; color:var(--muted); border:1px solid #333; }
  .modal-prob { margin-top:14px; font-size:.7rem; color:var(--muted); text-align:center; letter-spacing:1px; }
  .prob-bar { display:flex; height:6px; border-radius:3px; overflow:hidden; margin-top:6px; gap:2px; }
  .prob-seg { height:100%; border-radius:3px; }
</style>
</head>
<body>
<header>
  <h1>World Cup 2026</h1>
  <p>Interactive Bracket — Click any team or match</p>
</header>

<div class="bracket-scene" id="scene">
  <div class="center-glow"></div>
  <svg class="lines-svg" id="linesSvg"></svg>
</div>

<div class="legend">
  <div class="legend-item"><div class="ldot" style="background:#4caf50"></div>Full Time</div>
  <div class="legend-item"><div class="ldot" style="background:#e03c3c"></div>Live</div>
  <div class="legend-item"><div class="ldot" style="background:#4a7fd4"></div>Upcoming</div>
  <div class="legend-item"><div class="ldot" style="background:#222"></div>TBD</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-round" id="mRound"></div>
    <div class="modal-teams">
      <div class="modal-team">

    <div style="text-align:center"><span class="badge" id="mBadge"></span></div>

</div>

}

// ── Match data ──────────────────────────────────────────
// R32: ids 0-15  (outer ring, 16 matches = 32 teams)
// R16: ids 16-23 (8 matches)
// QF:  ids 24-27 (4 matches)
// SF:  ids 28-29 (2 matches)
// F:   id  30    (1 match)
const MATCHES = [
  // ── R32 ── (RIGHT half: 0-7, LEFT half: 8-15, clockwise from top)
  {id:0,  r:"Round of 32",   n1:"South Africa", n2:"Canada",        s1:0,   s2:1,   w:2,   date:"Jun 28 · 2:00 PM CDT",  venue:"SoFi Stadium, Los Angeles",       prob:null},

  {id:6,  r:"Round of 32",   n1:"Mexico",       n2:"Ecuador",       s1:null,s2:null,w:null, date:"Jun 30 · 8:00 PM CDT",  venue:"Estadio Azteca, Mexico City",     prob:[43,32,25]},

  {id:9,  r:"Round of 32",   n1:"USA",          n2:"Bosnia & Herz.",s1:null,s2:null,w:null, date:"Jul 1 · 7:00 PM CDT",   venue:"Levi's Stadium, Santa Clara",     prob:[72,18,10]},
  {id:10, r:"Round of 32",   n1:"Spain",        n2:"Austria",       s1:null,s2:null,w:null, date:"Jul 2 · 2:00 PM CDT",   venue:"SoFi Stadium, Los Angeles",       prob:[74,17,9]},
  {id:11, r:"Round of 32",   n1:"Portugal",     n2:"Colombia",      s1:0,   s2:0,   w:0,   date:"Jun 27 · 6:30 PM CDT",  venue:"BMO Field, Toronto",              prob:null},
  {id:12, r:"Round of 32",   n1:"Switzerland",  n2:"Algeria",       s1:null,s2:null,w:null, date:"Jul 2 · 8:00 PM CDT",   venue:"BC Place, Vancouver",             prob:null},

  {id:14, r:"Round of 32",   n1:"Croatia",      n2:"Ghana",         s1:2,   s2:1,   w:1,   date:"Jun 27 · 4:00 PM CDT",  venue:"Arrowhead Stadium, Kansas City",  prob:null},
  {id:15, r:"Round of 32",   n1:"Australia",    n2:"Egypt",         s1:null,s2:null,w:null, date:"Jul 3 · 9:30 PM CDT",   venue:"AT&T Stadium, Dallas",            prob:null},
  // ── R16 ──
  {id:16, r:"Round of 16",   n1:"TBD",n2:"TBD",s1:null,s2:null,w:null, date:"Jul 4 · 1:00 PM CDT",  venue:"NRG Stadium, Houston",                  prob:null},

function winner(m) { return m.w===1 ? m.n1 : m.w===2 ? m.n2 : 'TBD'; }
function propagate() {
  for(let i=0;i<8;i++){  MATCHES[16+i].n1=winner(MATCHES[i*2]); MATCHES[16+i].n2=winner(MATCHES[i*2+1]); }
  for(let i=0;i<4;i++){  MATCHES[24+i].n1=winner(MATCHES[16+i*2]); MATCHES[24+i].n2=winner(MATCHES[16+i*2+1]); }
  for(let i=0;i<2;i++){  MATCHES[28+i].n1=winner(MATCHES[24+i*2]); MATCHES[28+i].n2=winner(MATCHES[24+i*2+1]); }
  MATCHES[30].n1=winner(MATCHES[28]); MATCHES[30].n2=winner(MATCHES[29]);
}
propagate();

// ── Layout ──────────────────────────────────────────────
// 32 outer team slots, evenly spaced, clockwise from top (0°).
// Slot s → angle = s * 11.25°
// Match i → slots 2i (team A) and 2i+1 (team B)
//
// Bracket structure going inward:
//   R32 junction  (R_J32): where team A and B lines meet     — one per R32 match (16 total)
//   R16 match node (R_J16): clickable — one per R16 match (8 total), between each pair of R32 junctions
//   QF match node  (R_QF):  clickable — 4 total
//   SF match node  (R_SF):  clickable — 2 total
//   Trophy at center (Final clickable)
//
// RIGHT half = matches 0–7  (slots 0–15,  angles   0° – 168.75°)
// LEFT  half = matches 8–15 (slots 16–31, angles 180° – 348.75°)
// R16 match nodes for RIGHT half: ids 16–19 (between pairs 0+1, 2+3, 4+5, 6+7)
// R16 match nodes for LEFT  half: ids 20–23 (between pairs 8+9, 10+11, 12+13, 14+15)
// QF RIGHT: ids 24–25, QF LEFT: ids 26–27
// SF RIGHT: id 28,     SF LEFT: id 29

const scene = document.getElementById('scene');
const svgEl = document.getElementById('linesSvg');
const NS    = 'http://www.w3.org/2000/svg';

const R_OUT  = 0.86;  // outer teams
const R_ELBOW= 0.76;  // elbow bend point (where L-shape corners)
const R_J32  = 0.68;  // R32 junction dot (non-clickable connector)
const R_WIN  = 0.57;  // winner advancement node (flag circle)
const R_OPP  = 0.49;  // TBD opponent node (grey ? circle)
const R_J16  = 0.41;  // R16 match node (clickable)
const R_QF   = 0.28;  // QF match node  (clickable)
const R_SF   = 0.16;  // SF match node  (clickable)

function P(frac, deg) {
  const S = scene.offsetWidth, C = S/2;
  const r = frac * C;
  const a = (deg - 90) * Math.PI / 180;
  return { x: C + r*Math.cos(a), y: C + r*Math.sin(a) };
}
function slotAngle(s) { return s * (360/32); }
function midAngle(a, b) {
  // Midpoint going clockwise from a to b
  let d = ((b - a) + 360) % 360;
  return (a + d/2) % 360;
}

function svgLine(x1,y1,x2,y2,col,w) {
  const l = document.createElementNS(NS,'line');
  l.setAttribute('x1',x1); l.setAttribute('y1',y1);
  l.setAttribute('x2',x2); l.setAttribute('y2',y2);
  l.setAttribute('stroke',col); l.setAttribute('stroke-width',w);
  l.setAttribute('stroke-linecap','round');
  svgEl.appendChild(l);
}
function svgDot(x,y,r,fill) {
  const c = document.createElementNS(NS,'circle');
  c.setAttribute('cx',x); c.setAttribute('cy',y);
  c.setAttribute('r',r); c.setAttribute('fill',fill);
  svgEl.appendChild(c);
}
function place(el,x,y){ el.style.left=x+'px'; el.style.top=y+'px'; }

// Make a clickable inner-round match node
function makeMatchNode(matchId, szClass) {
  const m = MATCHES[matchId];
  const isTBD = m.n1 === 'TBD';
  const hasWinner = m.w !== null;

  const el = document.createElement('div');
  el.className = `match-node ${szClass}`;
  el.onclick = () => openModal(matchId);

  const dot = document.createElement('div');
  dot.className = 'match-dot' + (isTBD ? ' tbd' : '') + (hasWinner ? ' has-winner' : '');

  if (!isTBD && m.n1 !== 'TBD') {
    // Show winner flag if known, otherwise show match indicator
    const wName = winner(m);
    if (wName !== 'TBD') {
      const img = document.createElement('img');
      img.src = flagUrl(wName, 40); img.alt = wName;
      dot.appendChild(img);
    } else {
      const sp = document.createElement('span');
      sp.className = 'tbd-q'; sp.textContent = '?';
      dot.appendChild(sp);
    }
  } else {
    const sp = document.createElement('span');
    sp.className = 'tbd-q'; sp.textContent = '?';
    dot.appendChild(sp);
  }
  el.appendChild(dot);
  return el;
}

// Make an outer team circle
function makeTeamNode(name, matchId, statusClass) {
  const el = document.createElement('div');
  el.className = `team-node ${statusClass}`;
  el.onclick = () => openModal(matchId);
  const circle = document.createElement('div');
  circle.className = 'team-circle';
  const img = document.createElement('img');
  img.src = flagUrl(name, 80); img.alt = name;
  circle.appendChild(img);
  el.appendChild(circle);
  const lbl = document.createElement('div');
  lbl.className = 'team-label' + (statusClass==='s-winner'?' winner-lbl':'');
  lbl.textContent = name.length>9 ? name.slice(0,8)+'…' : name;
  el.appendChild(lbl);
  return el;
}

function outerStatus(m, which) {
  if (m.s1 !== null) return m.w===which ? 's-winner' : 's-done';
  const n = which===1 ? m.n1 : m.n2;
  return n==='TBD' ? 's-tbd' : 's-upcoming';
}

function build() {
  scene.querySelectorAll('.team-node,.match-node,.trophy-node,.score-tag,.winner-node,.opp-node').forEach(e=>e.remove());
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

  const S = scene.offsetWidth, C = S/2;

  // ── Compute key angles ───────────────────────────────────
  const angJ32 = Array.from({length:16}, (_,i) =>
    midAngle(slotAngle(2*i), slotAngle(2*i+1))
  );

  // R16 match mid-angles (8): midpoint between adjacent pairs of R32 junctions
  const angJ16 = Array.from({length:8}, (_,k) =>
    midAngle(angJ32[2*k], angJ32[2*k+1])
  );

  // QF match mid-angles (4): between pairs of R16 matches
  const angQF = Array.from({length:4}, (_,k) =>
    midAngle(angJ16[2*k], angJ16[2*k+1])
  );

  // SF positions
  const angSF = [
    midAngle(angQF[0], angQF[1]),
    midAngle(angQF[2], angQF[3])
  ];

  // ── Compute point positions ──────────────────────────────
  const ptTeam  = Array.from({length:32}, (_,s) => P(R_OUT,   slotAngle(s)));
  const ptElbow = Array.from({length:32}, (_,s) => P(R_ELBOW, slotAngle(s)));
  const ptJ32   = angJ32.map(a => P(R_J32, a));
  const ptWin   = angJ32.map(a => P(R_WIN, a));
  const ptOpp   = angJ32.map(a => P(R_OPP, a));
  const ptJ16   = angJ16.map(a => P(R_J16, a));
  const ptQF    = angQF.map(a  => P(R_QF,  a));
  const ptSF    = angSF.map(a  => P(R_SF,  a));

  // Line colors (dimmer toward center)
  const C1='#3a3118', C2='#333015', C3='#3a3820', C4='#454228', C5='#525030';

  // ── Draw lines ───────────────────────────────────────────

  // Teams → elbow point → R32 junction (L-shaped elbows)
  for (let i=0; i<16; i++) {
    const eA = ptElbow[2*i],   eB = ptElbow[2*i+1];
    const tA = ptTeam[2*i],    tB = ptTeam[2*i+1];
    const jct = ptJ32[i];

    // Radial segment: team → elbow
    svgLine(tA.x, tA.y, eA.x, eA.y, C1, 1.0);
    svgLine(tB.x, tB.y, eB.x, eB.y, C1, 1.0);

    // Tangential segment: elbow → junction
    svgLine(eA.x, eA.y, jct.x, jct.y, C1, 1.0);
    svgLine(eB.x, eB.y, jct.x, jct.y, C1, 1.0);

    // Elbow corner dots (gold)
    svgDot(eA.x, eA.y, 2.0, '#6a5228');
    svgDot(eB.x, eB.y, 2.0, '#6a5228');

    // Junction dot
    svgDot(jct.x, jct.y, 2.5, '#7a6228');

    // Junction → winner node
    svgLine(jct.x, jct.y, ptWin[i].x, ptWin[i].y, C2, 1.0);

    // Winner node → opponent node
    svgLine(ptWin[i].x, ptWin[i].y, ptOpp[i].x, ptOpp[i].y, C2, 0.9);
  }

  // Winner + opponent nodes → R16 match nodes
  for (let k=0; k<8; k++) {
    svgLine(ptOpp[2*k].x,   ptOpp[2*k].y,   ptJ16[k].x, ptJ16[k].y, C3, 1.0);
    svgLine(ptOpp[2*k+1].x, ptOpp[2*k+1].y, ptJ16[k].x, ptJ16[k].y, C3, 1.0);
  }

  // R16 → QF
  for (let k=0; k<4; k++) {
    svgLine(ptJ16[2*k].x,   ptJ16[2*k].y,   ptQF[k].x, ptQF[k].y, C4, 1.2);
    svgLine(ptJ16[2*k+1].x, ptJ16[2*k+1].y, ptQF[k].x, ptQF[k].y, C4, 1.2);
  }

  // QF → SF
  svgLine(ptQF[0].x, ptQF[0].y, ptSF[0].x, ptSF[0].y, C5, 1.4);
  svgLine(ptQF[1].x, ptQF[1].y, ptSF[0].x, ptSF[0].y, C5, 1.4);
  svgLine(ptQF[2].x, ptQF[2].y, ptSF[1].x, ptSF[1].y, C5, 1.4);
  svgLine(ptQF[3].x, ptQF[3].y, ptSF[1].x, ptSF[1].y, C5, 1.4);

  // SF → center (trophy/final)
  svgLine(ptSF[0].x, ptSF[0].y, C, C, C5, 1.6);
  svgLine(ptSF[1].x, ptSF[1].y, C, C, C5, 1.6);

  // ── Place outer team nodes ───────────────────────────────
  for (let i=0; i<16; i++) {
    const m = MATCHES[i];
    const pA = ptTeam[2*i], pB = ptTeam[2*i+1];

    const nA = makeTeamNode(m.n1, i, outerStatus(m,1));
    place(nA, pA.x, pA.y); scene.appendChild(nA);

    const nB = makeTeamNode(m.n2, i, outerStatus(m,2));
    place(nB, pB.x, pB.y); scene.appendChild(nB);

    // Score tag near junction, offset outward
    if (m.s1 !== null) {
      const jct = ptJ32[i];
      const midX = (pA.x + pB.x) / 2;
      const midY = (pA.y + pB.y) / 2;
      const tx = jct.x * 0.5 + midX * 0.5;
      const ty = jct.y * 0.5 + midY * 0.5;
      const tag = document.createElement('div');
      tag.className = 'score-tag';
      tag.textContent = `${m.s1}–${m.s2}`;
      tag.style.left = tx+'px'; tag.style.top = ty+'px';
      scene.appendChild(tag);
    }
  }

  // ── Place winner advancement nodes (R_WIN) ───────────────
  for (let i=0; i<16; i++) {
    const m = MATCHES[i];
    const w = winner(m);
    const pt = ptWin[i];

    const el = document.createElement('div');
    el.className = 'winner-node';
    el.style.left = pt.x + 'px';
    el.style.top  = pt.y + 'px';
    el.onclick = () => openModal(i);

    const circle = document.createElement('div');
    circle.className = 'winner-circle' + (w !== 'TBD' ? ' known' : '');

    if (w !== 'TBD') {
      const img = document.createElement('img');
      img.src = flagUrl(w, 40); img.alt = w;
      circle.appendChild(img);
    } else {
      const sp = document.createElement('span');
      sp.className = 'tbd-q'; sp.textContent = '?';
      circle.appendChild(sp);
    }
    el.appendChild(circle);
    scene.appendChild(el);
  }

  // ── Place TBD opponent nodes (R_OPP) ────────────────────
  // Each opponent node links to the R16 match that winner will play
  // R32 match i → feeds R16 match floor(i/2) → MATCHES[16 + floor(i/2)]
  for (let i=0; i<16; i++) {
    const r16Id = 16 + Math.floor(i / 2);
    const pt = ptOpp[i];

    const el = document.createElement('div');
    el.className = 'opp-node';
    el.style.left = pt.x + 'px';
    el.style.top  = pt.y + 'px';
    el.onclick = () => openModal(r16Id);

    const circle = document.createElement('div');
    circle.className = 'opp-circle';
    const sp = document.createElement('span');
    sp.className = 'tbd-q'; sp.textContent = '?';
    circle.appendChild(sp);
    el.appendChild(circle);
    scene.appendChild(el);
  }

  // ── Place R16 match nodes (clickable) ───────────────────
  for (let k=0; k<8; k++) {
    const node = makeMatchNode(16+k, 'sz-r16');
    place(node, ptJ16[k].x, ptJ16[k].y);
    scene.appendChild(node);
  }

  // ── Place QF match nodes ─────────────────────────────────
  for (let k=0; k<4; k++) {
    const node = makeMatchNode(24+k, 'sz-qf');
    place(node, ptQF[k].x, ptQF[k].y);
    scene.appendChild(node);
  }

  // ── Place SF match nodes ──────────────────────────────────
  const sfRight = makeMatchNode(28, 'sz-sf');
  place(sfRight, ptSF[0].x, ptSF[0].y);
  scene.appendChild(sfRight);

  const sfLeft = makeMatchNode(29, 'sz-sf');
  place(sfLeft, ptSF[1].x, ptSF[1].y);
  scene.appendChild(sfLeft);

  // ── Trophy / Final at center ──────────────────────────────
  const trophy = document.createElement('div');
  trophy.className = 'trophy-node';
  trophy.style.left = C+'px'; trophy.style.top = C+'px';
  trophy.innerHTML = `<div class="trophy-wrap">
    <img
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/FIFA_World_Cup_2022_Qatar_Trophy.png/240px-FIFA_World_Cup_2022_Qatar_Trophy.png"
      alt="World Cup Trophy"
      onerror="this.src='https://upload.wikimedia.org/wikipedia/en/thumb/e/ec/FIFA_World_Cup_Trophy.svg/240px-FIFA_World_Cup_Trophy.svg.png'"
    />
  </div>`;
  trophy.onclick = () => openModal(30);
  scene.appendChild(trophy);
}

let rTimer;
window.addEventListener('resize', () => { clearTimeout(rTimer); rTimer = setTimeout(build, 120); });
document.fonts.ready.then(build);

// ── Modal ────────────────────────────────────────────────
function openModal(id) {
  const m = MATCHES[id];
  document.getElementById('mRound').textContent = m.r;
  const n1 = m.n1==='TBD' ? 'TBD' : m.n1;
  const n2 = m.n2==='TBD' ? 'TBD' : m.n2;
  document.getElementById('mImg1').src = flagUrl(n1, 80) || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg"/>';
  document.getElementById('mImg2').src = flagUrl(n2, 80) || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg"/>';
  document.getElementById('mN1').textContent = n1;
  document.getElementById('mN2').textContent = n2;
  document.getElementById('mN1').className = 'modal-tname'+(m.w===1?' w':'');
  document.getElementById('mN2').className = 'modal-tname'+(m.w===2?' w':'');
  const hasScore = m.s1 !== null;
  document.getElementById('mScore').textContent = hasScore ? `${m.s1} — ${m.s2}` : '– vs –';
  document.getElementById('mDate').textContent  = m.date;
  document.getElementById('mVenue').textContent = m.venue;
  const badge    = document.getElementById('mBadge');
  const probWrap = document.getElementById('mProbWrap');
  if (hasScore) {
    badge.textContent = m.w===0 ? 'Draw (AET/Pen TBD)' : 'Full Time';
    badge.className = 'badge b-done';
    probWrap.style.display = 'none';
  } else if (m.n1==='TBD') {
    badge.textContent = 'Not Yet Set';
    badge.className = 'badge b-tbd';
    probWrap.style.display = 'none';
  } else {
    badge.textContent = 'Upcoming';
    badge.className = 'badge b-upcoming';
    if (m.prob) {
      const [p1,pd,p2] = m.prob;
      document.getElementById('mProbLabel').textContent = `Win prob: ${n1} ${p1}% · Draw ${pd}% · ${n2} ${p2}%`;
      document.getElementById('mProbBar').innerHTML = `
        <div class="prob-seg" style="flex:${p1};background:#4a7fd4;opacity:.85"></div>
        <div class="prob-seg" style="flex:${pd};background:#555;opacity:.85"></div>
        <div class="prob-seg" style="flex:${p2};background:#c9a84c;opacity:.85"></div>`;
      probWrap.style.display = 'block';
    } else { probWrap.style.display = 'none'; }
  }
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
</script>
</body>
