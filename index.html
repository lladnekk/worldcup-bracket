<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Cup 2026 Bracket</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      color: #d4a017;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #888;
      font-size: 0.9rem;
      letter-spacing: 2px;
      margin-bottom: 50px;
    }

    .coming-soon {
      margin-top: 60px;
      text-align: center;
      color: #444;
      font-size: 1.1rem;
      letter-spacing: 2px;
    }

    .trophy {
      font-size: 5rem;
      margin-bottom: 20px;
    }

    .status-bar {
      background: #1a1a1a;
      border: 1px solid #d4a017;
      border-radius: 8px;
      padding: 16px 32px;
      color: #d4a017;
      font-size: 0.85rem;
      letter-spacing: 2px;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <h1>World Cup 2026</h1>
  <p class="subtitle">Interactive Bracket</p>

  <div class="trophy">🏆</div>

  <div class="status-bar">⚽ BRACKET COMING SOON — PHASE 2 IN PROGRESS</div>

  <div class="coming-soon">
    <p>Built by lladnekk</p>
  </div>

</body>
</html>
