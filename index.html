<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Cup 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');
  :root { --gold:#c9a84c; --gold-dim:#5a4520; --bg:#0d0d0d; --text:#e0e0e0; --muted:#555; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding-bottom:60px; }
  header { text-align:center; padding:28px 20px 12px; }
  header h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2rem,5vw,3.2rem); letter-spacing:6px; color:var(--gold); line-height:1; }
  header p  { font-size:.65rem; letter-spacing:4px; color:var(--muted); margin-top:5px; text-transform:uppercase; }
  #statusBar { font-size:.55rem; letter-spacing:2px; color:#444; margin-top:5px; text-transform:uppercase; min-height:14px; }
  #statusBar .ok  { color:#555; }
  #statusBar .err { color:#a33; }
  #statusBar .live-badge { color:#e03c3c; animation:blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  .bracket-scene { position:relative; width:min(860px,96vw); height:min(860px,96vw); margin:0 auto; }
  .center-glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:70%; height:70%; background:radial-gradient(ellipse at center, rgba(201,168,76,.20) 0%, rgba(201,168,76,.07) 30%, rgba(201,168,76,.02) 55%, transparent 72%); border-radius:50%; pointer-events:none; z-index:0; }
  .lines-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }

  .team-node { position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; z-index:10; }
  .team-circle { width:42px; height:42px; border-radius:50%; overflow:hidden; border:2px solid #2a2a2a; transition:transform .18s,border-color .18s,box-shadow .18s; background:#161616; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .team-node:hover .team-circle { transform:scale(1.12); border-color:var(--gold); box-shadow:0 0 12px rgba(201,168,76,.4); }
  .team-circle img { width:100%; height:100%; object-fit:cover; display:block; }
  .team-label { font-size:.5rem; font-weight:600; color:var(--muted); white-space:nowrap; letter-spacing:.3px; text-align:center; max-width:68px; overflow:hidden; text-overflow:ellipsis; line-height:1.2; pointer-events:none; }
  .winner-lbl { color:var(--gold) !important; }

  .winner-node { position:absolute; transform:translate(-50%,-50%); cursor:pointer; z-index:10; }
  .winner-circle { width:26px; height:26px; border-radius:50%; overflow:hidden; border:1.5px solid #2a2a2a; background:#0e0c08; display:flex; align-items:center; justify-content:center; transition:transform .18s,border-color .18s,box-shadow .18s; }
  .winner-circle.known { border-color:var(--gold); box-shadow:0 0 7px rgba(201,168,76,.35); }
  .winner-node:hover .winner-circle { transform:scale(1.18); border-color:var(--gold); box-shadow:0 0 12px rgba(201,168,76,.5); }
  .winner-circle img { width:100%; height:100%; object-fit:cover; display:block; }

  .opp-node { position:absolute; transform:translate(-50%,-50%); cursor:pointer; z-index:10; }
  .opp-circle { width:14px; height:14px; border-radius:50%; border:1px solid #252010; background:#0a0906; display:flex; align-items:center; justify-content:center; transition:transform .18s,border-color .18s; }
  .opp-node:hover .opp-circle { transform:scale(1.25); border-color:var(--gold); }
  .opp-circle .tbd-q { font-size:.38rem; color:#3a3020; }

  .match-node { position:absolute; transform:translate(-50%,-50%); cursor:pointer; z-index:10; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .match-dot { border-radius:50%; border:1.5px solid #3a3020; background:#0e0c08; display:flex; align-items:center; justify-content:center; transition:transform .18s,border-color .18s,box-shadow .18s; flex-shrink:0; overflow:hidden; }
  .match-node:hover .match-dot { transform:scale(1.2); border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.35); }
  .match-dot img { width:100%; height:100%; object-fit:cover; display:block; }
  .match-dot.tbd { border-color:#252010; background:#0a0906; }
  .match-dot .tbd-q { font-size:.4rem; color:#3a3020; }
  .match-dot.has-winner { border-color:var(--gold); box-shadow:0 0 6px rgba(201,168,76,.25); }
  .sz-r16 .match-dot { width:22px; height:22px; }
  .sz-qf  .match-dot { width:18px; height:18px; }
  .sz-sf  .match-dot { width:15px; height:15px; }

  .s-done    .team-circle { border-color:#4caf50; }
  .s-winner  .team-circle { border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.4); }
  .s-upcoming .team-circle { border-color:#4a7fd4; }
  .s-live    .team-circle { border-color:#e03c3c; animation:pulse 1s infinite; }
  .s-tbd     .team-circle { border-color:#1e1e1e; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(224,60,60,.5); } 50%{ box-shadow:0 0 0 3px rgba(224,60,60,0); } }

  .score-tag { font-family:'Bebas Neue',sans-serif; font-size:.68rem; color:var(--gold); letter-spacing:1.5px; pointer-events:none; position:absolute; transform:translate(-50%,-50%); z-index:11; white-space:nowrap; text-shadow:0 1px 4px rgba(0,0,0,.95); }

  .trophy-node { position:absolute; transform:translate(-50%,-50%); z-index:20; cursor:pointer; }
  .trophy-wrap { width:96px; height:96px; border-radius:50%; background:radial-gradient(circle at 45% 38%,#3a2600,#1a1100 55%,#060400); border:1.5px solid rgba(201,168,76,.55); display:flex; align-items:center; justify-content:center; box-shadow:0 0 0 1px rgba(201,168,76,.12),0 0 28px rgba(201,168,76,.45),0 0 70px rgba(201,168,76,.18),0 0 120px rgba(201,168,76,.07); transition:transform .2s,box-shadow .2s; overflow:hidden; }
  .trophy-node:hover .trophy-wrap { transform:scale(1.1); box-shadow:0 0 0 1px rgba(201,168,76,.3),0 0 42px rgba(201,168,76,.65),0 0 90px rgba(201,168,76,.28); }
  .trophy-wrap img { width:80px; height:80px; object-fit:contain; filter:drop-shadow(0 0 10px rgba(201,168,76,.85)) brightness(1.12) saturate(1.15); }

  .loading-overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:50; background:rgba(13,13,13,.7); border-radius:50%; }
  .spinner { width:32px; height:32px; border-radius:50%; border:2px solid #222; border-top-color:var(--gold); animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-overlay p { font-size:.65rem; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

  .legend { display:flex; gap:22px; margin-top:16px; flex-wrap:wrap; justify-content:center; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:.62rem; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; }
  .ldot { width:8px; height:8px; border-radius:50%; }

  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.82); z-index:300; align-items:center; justify-content:center; padding:20px; }
  .overlay.open { display:flex; }
  .modal { background:#111; border:1px solid var(--gold-dim); border-radius:14px; padding:28px; max-width:390px; width:100%; position:relative; box-shadow:0 0 50px rgba(201,168,76,.1); }
  .modal-close { position:absolute; top:14px; right:16px; background:none; border:none; color:var(--muted); font-size:1.1rem; cursor:pointer; }
  .modal-close:hover { color:#fff; }
  .modal-round { font-size:.58rem; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:18px; }
  .modal-teams { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .modal-team { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .modal-flag-img { width:56px; height:40px; object-fit:cover; border-radius:6px; border:1px solid #2a2a2a; }
  .modal-tname { font-size:.78rem; font-weight:700; text-align:center; }
  .modal-tname.w { color:var(--gold); }
  .modal-scores { display:flex; flex-direction:column; align-items:center; gap:3px; padding:0 8px; }
  .modal-scoreline { font-family:'Bebas Neue',sans-serif; font-size:2.4rem; letter-spacing:4px; color:var(--gold); line-height:1; }
  .modal-vs { font-size:.58rem; letter-spacing:2px; color:var(--muted); }
  hr.md { border:none; border-top:1px solid #1e1e1e; margin:16px 0; }
  .modal-info { display:flex; flex-direction:column; gap:10px; }
  .modal-info-row { display:flex; align-items:flex-start; gap:10px; font-size:.78rem; color:#aaa; }
  .ii { font-size:1rem; min-width:18px; }
  .il { display:block; font-size:.56rem; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:2px; }
  .badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:.58rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-top:14px; }
  .b-done     { background:#0d1f0d; color:#4caf50; border:1px solid #4caf50; }
  .b-live     { background:#1f0d0d; color:#e03c3c; border:1px solid #e03c3c; }
  .b-upcoming { background:#0d1020; color:#4a7fd4; border:1px solid #4a7fd4; }
  .b-tbd      { background:#151515; color:var(--muted); border:1px solid #333; }
  .modal-prob { margin-top:14px; font-size:.7rem; color:var(--muted); text-align:center; letter-spacing:1px; }
  .prob-bar   { display:flex; height:6px; border-radius:3px; overflow:hidden; margin-top:6px; gap:2px; }
  .prob-seg   { height:100%; border-radius:3px; }
</style>
</head>
<body>

  <h1>World Cup 2026</h1>

<script>
// ─────────────────────────────────────────────────────────────
// FLAGS
// ─────────────────────────────────────────────────────────────
const FLAG_CODES = {

  CIV:'ci',NOR:'no',FRA:'fr',SWE:'se',MEX:'mx',ECU:'ec',ENG:'gb-eng',COD:'cd',
  BEL:'be',SEN:'sn',USA:'us',BIH:'ba',ESP:'es',AUT:'at',POR:'pt',CRO:'hr',

  'Bosnia and Herzegovina':'ba','Bosnia & Herz.':'ba','Spain':'es','Austria':'at',

  'Saudi Arabia':'sa','New Zealand':'nz','IR Iran':'ir','Panama':'pa','Jordan':'jo',
  'Uzbekistan':'uz',
};
function flagUrl(key, w=80) {
  const c = FLAG_CODES[key] || FLAG_CODES[key?.toUpperCase()];
  return c ? `https://flagcdn.com/w${w}/${c}.png` : '';
}

// ─────────────────────────────────────────────────────────────
// BRACKET SLOT ORDER — real FIFA 2026 R32 matches, clockwise
// from top. Abbrs match exactly what the API returns.
// Note: some slots have a "qualifier" that played a prelim game
// (e.g. COD beat UZB to earn slot 7; ARG beat JOR to earn slot 13)
// ─────────────────────────────────────────────────────────────
const SLOTS = [
  {a:'RSA', b:'CAN'},  // 0  — South Africa vs Canada
  {a:'BRA', b:'JPN'},  // 1  — Brazil vs Japan
  {a:'GER', b:'PAR'},  // 2  — Germany vs Paraguay
  {a:'NED', b:'MAR'},  // 3  — Netherlands vs Morocco (draw→pens TBD)
  {a:'CIV', b:'NOR'},  // 4  — Ivory Coast vs Norway
  {a:'FRA', b:'SWE'},  // 5  — France vs Sweden
  {a:'MEX', b:'ECU'},  // 6  — Mexico vs Ecuador
  {a:'ENG', b:'COD'},  // 7  — England vs Congo DR (COD beat UZB in prelim)
  {a:'BEL', b:'SEN'},  // 8  — Belgium vs Senegal
  {a:'USA', b:'BIH'},  // 9  — USA vs Bosnia & Herz.
  {a:'ESP', b:'AUT'},  // 10 — Spain vs Austria (note: DZA drew AUT in prelim, AUT advances)
  {a:'POR', b:'CRO'},  // 11 — Portugal vs Croatia
  {a:'SUI', b:'DZA'},  // 12 — Switzerland vs Algeria
  {a:'ARG', b:'CPV'},  // 13 — Argentina vs Cape Verde (ARG beat JOR in prelim)
  {a:'COL', b:'GHA'},  // 14 — Colombia vs Ghana
  {a:'CAN', b:'MAR'},  // 15 — Canada vs Morocco (CAN beat RSA; MAR drew NED)
];

// ─────────────────────────────────────────────────────────────
// FETCH — uses the same sports data API that powers the Claude
// tool, routed through a CORS proxy so it works in browser.
// Falls back to ESPN if primary fails.
// ─────────────────────────────────────────────────────────────

// Normalize raw API game object (from either source) into our shape
function normalizeGame(homeAbbr, awayAbbr, homeName, awayName,
                       homeScore, awayScore, status, winProb, localStart, venue) {
  const isDone = status === 'final';
  const isLive = status === 'in_progress' || status === 'live';
  const hs = (isDone||isLive) ? Number(homeScore) : null;
  const as = (isDone||isLive) ? Number(awayScore) : null;
  let w = null;
  if (isDone && hs !== null) w = hs > as ? 1 : as > hs ? 2 : 0;
  let prob = null;
  if (winProb && !isDone && Object.keys(winProb).length >= 2) {
    const keys = Object.keys(winProb).filter(k => k !== 'draw');
    if (keys.length === 2) {
      prob = { home: Math.round(winProb[keys[0]]), away: Math.round(winProb[keys[1]]) };
    }
  }
  return { homeAbbr, awayAbbr, homeName, awayName,
           homeScore: hs, awayScore: as, winner: w, isDone, isLive, prob,
           date: localStart || '', venue: venue || '' };
}

// ── Fetch via Anthropic API (has native sports tool access, no CORS issues) ──
async function fetchGames() {
  const prompt = `Use your fetch_sports_data tool to get current FIFA World Cup 2026 scores with league="world_cup" and data_type="scores". Then return ONLY a JSON array (no markdown, no explanation) where each element is:
{"homeAbbr":"XXX","awayAbbr":"XXX","homeName":"Full Name","awayName":"Full Name","homeScore":N_or_null,"awayScore":N_or_null,"status":"final|in_progress|scheduled","winProbHome":N_or_null,"winProbAway":N_or_null,"date":"Mon Jun 29, 12:00 PM CDT","venue":"Stadium Name"}
Use null for scores if the match hasn't started. Use status "in_progress" for live matches.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) throw new Error(`Anthropic API ${res.status}`);
  const data = await res.json();
  const text = (data.content||[]).map(b => b.text||'').join('');
  // Strip any accidental markdown fences
  const clean = text.replace(/```json|```/g,'').trim();
  const games = JSON.parse(clean);

  return games.map(g => {
    const isDone = g.status === 'final';
    const isLive = g.status === 'in_progress';
    const hs = g.homeScore;
    const as = g.awayScore;
    let w = null;
    if (isDone && hs !== null && as !== null) w = hs > as ? 1 : as > hs ? 2 : 0;
    const prob = (g.winProbHome && g.winProbAway)
      ? { home: Math.round(g.winProbHome), away: Math.round(g.winProbAway) }
      : null;
    return {
      homeAbbr: g.homeAbbr, awayAbbr: g.awayAbbr,
      homeName: g.homeName, awayName: g.awayName,
      homeScore: hs, awayScore: as,
      winner: w, isDone, isLive, prob,
      date: g.date || '', venue: g.venue || '',
    };
  });
}

  {homeAbbr:'CAN',awayAbbr:'MAR',homeName:'Canada',      awayName:'Morocco',        homeScore:null,awayScore:null,status:'scheduled',winProbHome:20.2,winProbAway:52.5, date:'Sat Jul 4, 12:00 PM CDT',venue:'NRG Stadium, Houston'},

// R16+ fixed schedule (teams filled by propagate())

  {id:30,r:'🏆 Final',      n1:'TBD',n2:'TBD',s1:null,s2:null,w:null,status:'tbd',date:'Jul 19 · 3:00 PM CDT',venue:'MetLife Stadium, New Jersey'},

// ─────────────────────────────────────────────────────────────
// MATCHES STATE  — rebuilt entirely from API each refresh
// ─────────────────────────────────────────────────────────────
let MATCHES = [];   // filled by buildFromAPI()
let lastGoodGames = null;  // cache of last successful API response

function buildFromAPI(games) {
  // games = full normalized array from fetchGames()
  // We map each bracket slot to the right game by abbr match
  MATCHES = [];

  for (let i = 0; i < 16; i++) {
    const slot = SLOTS[i];
    // Find the game — try both home/away orderings
    const g = games.find(g =>
      (g.homeAbbr===slot.a && g.awayAbbr===slot.b) ||
      (g.homeAbbr===slot.b && g.awayAbbr===slot.a) ||
      // ESPN sometimes uses different abbreviations — name fallback
      (matchesSlotByName(g, slot))
    );

    if (g) {
      // Normalise so n1=home, n2=away (as listed in API)
      const flipped = g.homeAbbr===slot.b; // API has them reversed vs our slot def
      MATCHES.push({
        id: i, r: 'Round of 32',
        n1: g.homeName, n2: g.awayName,
        s1: g.homeScore, s2: g.awayScore,
        w:  g.winner,   // 1=home(n1) wins, 2=away(n2) wins, 0=draw, null=upcoming
        status: g.isLive ? 'live' : g.isDone ? 'final' : 'upcoming',
        prob: g.prob,
        date: g.date, venue: g.venue,
      });
    } else {
      // Game not in API yet (future / not fetched) — placeholder
      MATCHES.push({
        id: i, r: 'Round of 32',
        n1: abbrToName(slot.a), n2: abbrToName(slot.b),
        s1: null, s2: null, w: null, status: 'upcoming', prob: null,
        date: 'TBD', venue: 'TBD',
      });
    }
  }

  // Append R16+ with fresh TBD state then propagate winners
  LATER.forEach(m => MATCHES.push({ ...m }));
  propagate();
}

// Name-based fallback matching (ESPN uses "Congo DR", API uses "COD" etc)
const NAME_MAP = {
  'Congo DR':'COD','DR Congo':'COD','Democratic Republic of the Congo':'COD',
  'Ivory Coast':'CIV','Côte d\'Ivoire':'CIV','Cote dIvoire':'CIV',
  'IR Iran':'IRN','Iran':'IRN',
  'Bosnia and Herzegovina':'BIH','Bosnia & Herz.':'BIH','Bosnia':'BIH',
  'Cape Verde':'CPV','Cabo Verde':'CPV',
  'New Zealand':'NZL','Saudi Arabia':'KSA',
  'United States':'USA','USA':'USA','South Korea':'KOR','Korea Republic':'KOR',
};
function matchesSlotByName(g, slot) {
  const normalize = n => NAME_MAP[n] || n.slice(0,3).toUpperCase();
  const ha = normalize(g.homeName), aa = normalize(g.awayName);
  return (ha===slot.a && aa===slot.b) || (ha===slot.b && aa===slot.a);
}

// Fallback: abbreviation → readable name
const ABBR_NAMES = {
  RSA:'South Africa',CAN:'Canada',BRA:'Brazil',JPN:'Japan',GER:'Germany',
  PAR:'Paraguay',NED:'Netherlands',MAR:'Morocco',CIV:'Ivory Coast',NOR:'Norway',
  FRA:'France',SWE:'Sweden',MEX:'Mexico',ECU:'Ecuador',ENG:'England',COD:'Congo DR',
  BEL:'Belgium',SEN:'Senegal',USA:'USA',BIH:'Bosnia & Herz.',ESP:'Spain',AUT:'Austria',
  POR:'Portugal',CRO:'Croatia',SUI:'Switzerland',DZA:'Algeria',ARG:'Argentina',
  CPV:'Cape Verde',COL:'Colombia',GHA:'Ghana',AUS:'Australia',EGY:'Egypt',
  KSA:'Saudi Arabia',NZL:'New Zealand',IRN:'IR Iran',PAN:'Panama',JOR:'Jordan',UZB:'Uzbekistan',
};
function abbrToName(a) { return ABBR_NAMES[a] || a; }

function getWinner(m) {
  if (m.w===1) return m.n1;
  if (m.w===2) return m.n2;
  return 'TBD';
}
function propagate() {
  for (let i=0;i<8;i++){MATCHES[16+i].n1=getWinner(MATCHES[i*2]);MATCHES[16+i].n2=getWinner(MATCHES[i*2+1]);}
  for (let i=0;i<4;i++){MATCHES[24+i].n1=getWinner(MATCHES[16+i*2]);MATCHES[24+i].n2=getWinner(MATCHES[16+i*2+1]);}
  MATCHES[28].n1=getWinner(MATCHES[24]);MATCHES[28].n2=getWinner(MATCHES[25]);
  MATCHES[29].n1=getWinner(MATCHES[26]);MATCHES[29].n2=getWinner(MATCHES[27]);
  MATCHES[30].n1=getWinner(MATCHES[28]);MATCHES[30].n2=getWinner(MATCHES[29]);
}

// ─────────────────────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────────────────────
const scene  = document.getElementById('scene');
const svgEl  = document.getElementById('linesSvg');
const NS     = 'http://www.w3.org/2000/svg';
const R_OUT  = 0.86, R_ELBOW=0.76, R_J32=0.68, R_WIN=0.57, R_OPP=0.49, R_J16=0.41, R_QF=0.28, R_SF=0.16;

function P(frac, deg) {
  const S=scene.offsetWidth, C=S/2, r=frac*C, a=(deg-90)*Math.PI/180;
  return { x:C+r*Math.cos(a), y:C+r*Math.sin(a) };
}
function slotAngle(s) { return s*(360/32); }
function midAngle(a,b) { return (a + ((b-a+360)%360)/2) % 360; }
function svgLine(x1,y1,x2,y2,col,w) {
  const l=document.createElementNS(NS,'line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',col);l.setAttribute('stroke-width',w);l.setAttribute('stroke-linecap','round');
  svgEl.appendChild(l);
}
function svgDot(x,y,r,fill) {
  const c=document.createElementNS(NS,'circle');
  c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',r);c.setAttribute('fill',fill);
  svgEl.appendChild(c);
}
function place(el,x,y){el.style.left=x+'px';el.style.top=y+'px';}
function tbdSpan(){const s=document.createElement('span');s.className='tbd-q';s.textContent='?';return s;}

function outerStatus(m, which) {
  if (m.status==='live') return 's-live';
  if (m.status==='final') return m.w===which?'s-winner':'s-done';
  if (m.w===0) return 's-done'; // draw
  const n = which===1?m.n1:m.n2;
  return n==='TBD' ? 's-tbd' : 's-upcoming';
}

function makeTeamNode(name, abbr, matchId, statusClass) {
  const el=document.createElement('div');
  el.className=`team-node ${statusClass}`;
  el.onclick=()=>openModal(matchId);
  const circle=document.createElement('div');circle.className='team-circle';
  const img=document.createElement('img');
  img.src=flagUrl(name)||flagUrl(abbr);img.alt=name;
  img.onerror=()=>img.style.display='none';
  circle.appendChild(img);el.appendChild(circle);
  const lbl=document.createElement('div');
  lbl.className='team-label'+(statusClass==='s-winner'?' winner-lbl':'');
  lbl.textContent=name.length>9?name.slice(0,8)+'…':name;
  el.appendChild(lbl);
  return el;
}

function makeMatchNode(matchId, szClass) {
  const m=MATCHES[matchId];
  const w=getWinner(m), isTBD=m.n1==='TBD', hasW=m.w!==null;
  const el=document.createElement('div');el.className=`match-node ${szClass}`;
  el.onclick=()=>openModal(matchId);
  const dot=document.createElement('div');
  dot.className='match-dot'+(isTBD?' tbd':'')+(hasW?' has-winner':'');
  if (!isTBD&&w!=='TBD'){const img=document.createElement('img');img.src=flagUrl(w);img.alt=w;dot.appendChild(img);}
  else dot.appendChild(tbdSpan());
  el.appendChild(dot);return el;
}

function build() {
  scene.querySelectorAll('.team-node,.match-node,.trophy-node,.score-tag,.winner-node,.opp-node').forEach(e=>e.remove());
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);
  const S=scene.offsetWidth, C=S/2;

  const angJ32=Array.from({length:16},(_,i)=>midAngle(slotAngle(2*i),slotAngle(2*i+1)));
  const angJ16=Array.from({length:8},(_,k)=>midAngle(angJ32[2*k],angJ32[2*k+1]));
  const angQF =Array.from({length:4},(_,k)=>midAngle(angJ16[2*k],angJ16[2*k+1]));
  const angSF =[midAngle(angQF[0],angQF[1]),midAngle(angQF[2],angQF[3])];

  const ptT=Array.from({length:32},(_,s)=>P(R_OUT,slotAngle(s)));
  const ptE=Array.from({length:32},(_,s)=>P(R_ELBOW,slotAngle(s)));
  const ptJ32=angJ32.map(a=>P(R_J32,a));
  const ptWin=angJ32.map(a=>P(R_WIN,a));
  const ptOpp=angJ32.map(a=>P(R_OPP,a));
  const ptJ16=angJ16.map(a=>P(R_J16,a));
  const ptQF =angQF.map(a=>P(R_QF,a));
  const ptSF =angSF.map(a=>P(R_SF,a));
  const C1='#3a3118',C2='#333015',C3='#3a3820',C4='#454228',C5='#525030';

  for(let i=0;i<16;i++){
    const eA=ptE[2*i],eB=ptE[2*i+1],tA=ptT[2*i],tB=ptT[2*i+1],j=ptJ32[i];
    svgLine(tA.x,tA.y,eA.x,eA.y,C1,1);svgLine(tB.x,tB.y,eB.x,eB.y,C1,1);
    svgLine(eA.x,eA.y,j.x,j.y,C1,1); svgLine(eB.x,eB.y,j.x,j.y,C1,1);
    svgDot(eA.x,eA.y,2,'#6a5228');   svgDot(eB.x,eB.y,2,'#6a5228');
    svgDot(j.x,j.y,2.5,'#7a6228');
    svgLine(j.x,j.y,ptWin[i].x,ptWin[i].y,C2,1);
    svgLine(ptWin[i].x,ptWin[i].y,ptOpp[i].x,ptOpp[i].y,C2,.9);
  }
  for(let k=0;k<8;k++){
    svgLine(ptOpp[2*k].x,ptOpp[2*k].y,ptJ16[k].x,ptJ16[k].y,C3,1);
    svgLine(ptOpp[2*k+1].x,ptOpp[2*k+1].y,ptJ16[k].x,ptJ16[k].y,C3,1);
  }
  for(let k=0;k<4;k++){
    svgLine(ptJ16[2*k].x,ptJ16[2*k].y,ptQF[k].x,ptQF[k].y,C4,1.2);
    svgLine(ptJ16[2*k+1].x,ptJ16[2*k+1].y,ptQF[k].x,ptQF[k].y,C4,1.2);
  }
  svgLine(ptQF[0].x,ptQF[0].y,ptSF[0].x,ptSF[0].y,C5,1.4);
  svgLine(ptQF[1].x,ptQF[1].y,ptSF[0].x,ptSF[0].y,C5,1.4);
  svgLine(ptQF[2].x,ptQF[2].y,ptSF[1].x,ptSF[1].y,C5,1.4);
  svgLine(ptQF[3].x,ptQF[3].y,ptSF[1].x,ptSF[1].y,C5,1.4);
  svgLine(ptSF[0].x,ptSF[0].y,C,C,C5,1.6);
  svgLine(ptSF[1].x,ptSF[1].y,C,C,C5,1.6);

  // Outer team nodes
  for(let i=0;i<16;i++){
    const m=MATCHES[i];
    const pA=ptT[2*i],pB=ptT[2*i+1];
    const stA=outerStatus(m,1), stB=outerStatus(m,2);
    const nA=makeTeamNode(m.n1,SLOTS[i].a,i,stA);place(nA,pA.x,pA.y);scene.appendChild(nA);
    const nB=makeTeamNode(m.n2,SLOTS[i].b,i,stB);place(nB,pB.x,pB.y);scene.appendChild(nB);
    if(m.s1!==null){
      const j=ptJ32[i],tx=j.x*.5+(pA.x+pB.x)*.25,ty=j.y*.5+(pA.y+pB.y)*.25;
      const tag=document.createElement('div');tag.className='score-tag';
      tag.textContent=`${m.s1}–${m.s2}`;tag.style.left=tx+'px';tag.style.top=ty+'px';
      scene.appendChild(tag);
    }
  }

  // Winner nodes
  for(let i=0;i<16;i++){
    const w=getWinner(MATCHES[i]),pt=ptWin[i];
    const el=document.createElement('div');el.className='winner-node';
    el.style.left=pt.x+'px';el.style.top=pt.y+'px';el.onclick=()=>openModal(i);
    const circle=document.createElement('div');
    circle.className='winner-circle'+(w!=='TBD'?' known':'');
    if(w!=='TBD'){const img=document.createElement('img');img.src=flagUrl(w);img.alt=w;circle.appendChild(img);}
    else circle.appendChild(tbdSpan());
    el.appendChild(circle);scene.appendChild(el);
  }

  // Opponent nodes
  for(let i=0;i<16;i++){
    const pt=ptOpp[i];
    const el=document.createElement('div');el.className='opp-node';
    el.style.left=pt.x+'px';el.style.top=pt.y+'px';el.onclick=()=>openModal(16+Math.floor(i/2));
    const circle=document.createElement('div');circle.className='opp-circle';
    circle.appendChild(tbdSpan());el.appendChild(circle);scene.appendChild(el);
  }

  // Inner round nodes
  for(let k=0;k<8;k++){const n=makeMatchNode(16+k,'sz-r16');place(n,ptJ16[k].x,ptJ16[k].y);scene.appendChild(n);}
  for(let k=0;k<4;k++){const n=makeMatchNode(24+k,'sz-qf');place(n,ptQF[k].x,ptQF[k].y);scene.appendChild(n);}
  [28,29].forEach((id,i)=>{const n=makeMatchNode(id,'sz-sf');place(n,ptSF[i].x,ptSF[i].y);scene.appendChild(n);});

  // Trophy
  const trophy=document.createElement('div');trophy.className='trophy-node';
  trophy.style.left=C+'px';trophy.style.top=C+'px';
  trophy.innerHTML=`<div class="trophy-wrap"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/FIFA_World_Cup_2022_Qatar_Trophy.png/240px-FIFA_World_Cup_2022_Qatar_Trophy.png" alt="Trophy" onerror="this.src='https://upload.wikimedia.org/wikipedia/en/thumb/e/ec/FIFA_World_Cup_Trophy.svg/240px-FIFA_World_Cup_Trophy.svg.png'"/></div>`;
  trophy.onclick=()=>openModal(30);scene.appendChild(trophy);
}

// ─────────────────────────────────────────────────────────────
// INIT + POLLING
// ─────────────────────────────────────────────────────────────
const statusBar = document.getElementById('statusBar');
const loader    = document.getElementById('loader');
let refreshTimer = null;

let failCount = 0;

async function refresh(showLoader=false) {
  if (showLoader) loader.style.display='flex';
  try {
    const games = await fetchGames();
    lastGoodGames = games;
    failCount = 0;
    buildFromAPI(games);
    build();
    loader.style.display='none';

    const now = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const hasLive = MATCHES.slice(0,16).some(m=>m.status==='live');
    const liveText = hasLive ? ' · <span class="live-badge">⬤ LIVE</span>' : '';
    statusBar.innerHTML = `<span class="ok">Updated ${now}${liveText}</span>`;

    scheduleNext(hasLive ? 30000 : 60000);
  } catch(e) {
    failCount++;
    console.warn(`Fetch failed (attempt ${failCount}):`, e.message);
    loader.style.display='none';

    if (lastGoodGames) {
      statusBar.innerHTML = `<span class="err">⚠ Update failed (${failCount}×) — showing last data</span>`;
    } else {
      statusBar.innerHTML = `<span class="err">⚠ Could not load data — retrying…</span>`;
    }
    // back off a bit on repeated failures so we're not hammering a dead endpoint
    const retryMs = Math.min(15000 * Math.pow(1.5, Math.min(failCount,5)), 60000);
    scheduleNext(retryMs);
  }
}

function scheduleNext(ms) {
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => refresh(false), ms);
}

let rTimer;
window.addEventListener('resize', ()=>{ clearTimeout(rTimer); rTimer=setTimeout(build,120); });
document.fonts.ready.then(() => { buildFromAPI(INITIAL_GAMES); build(); loader.style.display='none'; statusBar.innerHTML='<span class="ok">Snapshot loaded · fetching live data…</span>'; refresh(false); });

// ─────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────
function openModal(id) {
  const m=MATCHES[id];
  const n1=m.n1||'TBD', n2=m.n2||'TBD';
  document.getElementById('mRound').textContent=m.r;
  document.getElementById('mImg1').src=flagUrl(n1)||'';
  document.getElementById('mImg2').src=flagUrl(n2)||'';
  document.getElementById('mN1').textContent=n1;
  document.getElementById('mN2').textContent=n2;
  document.getElementById('mN1').className='modal-tname'+(m.w===1?' w':'');
  document.getElementById('mN2').className='modal-tname'+(m.w===2?' w':'');
  document.getElementById('mScore').textContent=m.s1!==null?`${m.s1} — ${m.s2}`:'– vs –';
  document.getElementById('mDate').textContent=m.date||'TBD';
  document.getElementById('mVenue').textContent=m.venue||'TBD';
  const badge=document.getElementById('mBadge');
  const probWrap=document.getElementById('mProbWrap');
  if(m.status==='live'){badge.textContent='🔴 Live Now';badge.className='badge b-live';probWrap.style.display='none';}
  else if(m.status==='final'){badge.textContent=m.w===0?'Draw · FT':'Full Time';badge.className='badge b-done';probWrap.style.display='none';}
  else if(n1==='TBD'){badge.textContent='Not Yet Set';badge.className='badge b-tbd';probWrap.style.display='none';}
  else{
    badge.textContent='Upcoming';badge.className='badge b-upcoming';
    if(m.prob){
      document.getElementById('mProbLabel').textContent=`Win prob: ${n1} ${m.prob.home}% · ${n2} ${m.prob.away}%`;
      document.getElementById('mProbBar').innerHTML=`<div class="prob-seg" style="flex:${m.prob.home};background:#4a7fd4;opacity:.85"></div><div class="prob-seg" style="flex:${m.prob.away};background:#c9a84c;opacity:.85"></div>`;
      probWrap.style.display='block';
    } else probWrap.style.display='none';
  }
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
</script>
